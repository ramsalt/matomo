---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: circle-ci-rbac
  namespace: matomo
rules:    
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - roles
  - rolebindings
  verbs:
  - list
  - create
  - delete
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: circle-ci-rbac
  namespace: matomo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: circle-ci-rbac
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: circle-ci
