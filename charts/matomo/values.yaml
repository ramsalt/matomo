# Default values for matomo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/ramsalt/matomo
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

matomo:
  bitnamiDebug: "false"
  host: "127.0.0.1"
  auth:
    username: "User"
    email: ""
  website:
    name: ""
    host: ""
  database:
    host: ""
    port: "3306"
    name: "matomo"
    user: "matomo"
    password: ""
    sslEnable: "yes"
    sslCa: "/etc/ssl/ca.crt"
    sslCrt: "/etc/ssl/tls.crt"
    sslKey: "/etc/ssl/tls.key"
    sslVerify: "yes"
  php:
    enableOpcache: "yes"
    memoryLimit: "256M"
    maxExecutionTime: "30"
    maxInputVars: "1000"
    postMaxSize: "40M"
    uploadMaxFilesize: "40M"
  enableProxyUriHeader: "no"
  assumeSecureProtocol: "no"
  enableForceSsl: "no"
  proxyClientHeader: ""
  proxyHostHeader: ""
  multiServerEnvironment: "no"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
