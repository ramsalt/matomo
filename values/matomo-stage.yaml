
replicaCount: 2

image:
  pullPolicy: Always
  tag: main

imagePullSecrets:
  - name: ghcr-access-token

matomo:
  database:
    host: "matomodb.ramsalt.com"
    port: "3306"
    name: "matomo"
    user: "matomo"
  php:
    memoryLimit: "256M"
    maxExecutionTime: "30"
    maxInputVars: "1000"
    postMaxSize: "40M"
    uploadMaxFilesize: "40M"
  enableProxyUriHeader: "0"
  assumeSecureProtocol: "1"
  enableForceSsl: "1"
  proxyClientHeader: "HTTP_X_ORIGINAL_FORWARDED_FOR"
  proxyHostHeader: "HTTP_CDN_HOST"
  multiServerEnvironment: "1"

nginx:
  resources:
    limits:
      cpu: 1000m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 4Mi

crond:
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 4Mi

resources:
  limits:
    cpu: 1500m
    memory: 12Gi
  requests:
    cpu: 50m
    memory: 6Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
  hosts:
    - host: matomo-k8s-stage.ramsalt.com
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: matomo-tls
     hosts:
       - matomo-k8s-stage.ramsalt.com
