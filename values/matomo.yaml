
replicaCount: 2

image:
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-access-token


matomo:
  database:
    host: "matomodb.ramsalt.com"
    # internal database ip: change this value in case of a database switch
    ip: "10.99.8.11"
    port: "3306"
    name: "matomo"
    user: "matomo"
  php:
    memoryLimit: "12228M"
    cliMemoryLimit: "-1"
    maxExecutionTime: "300"
    maxInputVars: "1000"
    postMaxSize: "40M"
    uploadMaxFilesize: "40M"
    fpmPmMaxChildren: "20"
    fpmPmMaxRequests: "5000"
    fpmPmMaxSpareServers: "10"
    fpmPmMinSpareServers: "5"
    fpmPmStartServers: "10"
    sendmailPath: "/usr/sbin/sendmail -t"
  enableProxyUriHeader: "0"
  assumeSecureProtocol: "1"
  enableForceSsl: "1"
  proxyClientHeader: "HTTP_X_ORIGINAL_FORWARDED_FOR"
  proxyHostHeader: "HTTP_CDN_HOST"
  multiServerEnvironment: "1"
  memoryLimitWhenArchiving: "4096"

nginx:
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 4Mi

crond:
  resources:
    limits:
      memory: 18Gi
    requests:
      cpu: 2000m
      memory: 1024Mi

resources:
  limits:
    memory: 24Gi
  requests:
    cpu: 2000m
    memory: 12Gi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
  hosts:
    - host: matomo-k8s.ramsalt.com
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: matomo-tls
     hosts:
       - matomo-k8s.ramsalt.com
