controller:
  image:
    pullPolicy: Always

  kind: DaemonSet

  config:
    use-proxy-protocol: "false"
    use-forwarded-headers: "true"
    proxy-buffer-size: "64k"
    proxy-real-ip-cidr: "0.0.0.0/0"

  resources:
    requests:
      memory: 200Mi
      cpu: 15m
    limits:
      memory: 200Mi
      cpu: 500m

  podSecurityContext:
    runAsNonRoot: true

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE
    runAsUser: 101
    seccompProfile:
      type: RuntimeDefault

defaultBackend:
  enabled: false
